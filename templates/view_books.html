<!DOCTYPE html>
<html>

<head>
    <title>View Books</title>
</head>


<body>

<h1>📚 Book List</h1>


<table border="1" cellpadding="10">


<tr>
    <th>Book ID</th>
    <th>Title</th>
    <th>Author</th>
    <th>Category</th>
    <th>Quantity</th>
</tr>


{% for book in books %}

<tr>

    <td>{{ book["BookID"] }}</td>

    <td>{{ book["Title"] }}</td>

    <td>{{ book["Author"] }}</td>

    <td>{{ book["Category"] }}</td>

    <td>{{ book["Quantity"] }}</td>

</tr>


{% endfor %}


</table>


<br>


<a href="/books">
    ⬅ Back
</a>


</body>

</html>
