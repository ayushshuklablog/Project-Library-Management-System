<!DOCTYPE html>
<html>

<head>

<title>Delete Book</title>

</head>


<body>


<h1>🗑 Delete Book</h1>


<form method="POST">

type="text"
name="book_id"
placeholder="Book ID"
required
>

type="submit"
value="Delete Book"
>


</form>

{% endif %}



<br>

<a href="/books">⬅ Back</a>


</body>

</html>
